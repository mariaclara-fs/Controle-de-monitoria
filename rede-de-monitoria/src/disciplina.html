<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Disciplina</title>
</head>
<body class="bg-[#f5f5f2] min-h-screen">
    <div class="flex flex-col min-h-screen">
        <header class="flex items-center justify-between px-6 py-4 bg-gradient-to-br from-green-500 to-green-800">
            <div class="flex items-center gap-3">
                <img src="./assets/Logo_RDM-removebg-preview.png" class="w-14 md:w-20" alt="logo">
                <div>
                    <h1 class="font-bold text-white">Rede de</h1>
                    <h1 class="font-bold text-white">Monitoria IFPB</h1>
                </div>
            </div>
            <h1 class="text-3xl font-bold text-white hidden md:block">Disciplina</h1>
        </header>
        <main class="flex flex-1 px-6 py-8">
            <div class="max-w-6xl mx-auto w-full space-y-6">
                <section class="bg-white rounded-3xl p-8 shadow-sm">
                    <div class="flex flex-col gap-6 md:flex-row md:items-center md:justify-between">
                        <div>
                            <h1 class="text-4xl font-bold text-green-900" id="disciplina-nome">Nome da disciplina</h1>
                            <p class="mt-2 text-gray-700" id="disciplina-professor">Professor</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-gray-500">Turma</p>
                            <p class="text-xl font-semibold text-gray-900" id="disciplina-turma">-</p>
                        </div>
                    </div>
                </section>
                <section class="grid gap-6 lg:grid-cols-2">
                    <div class="bg-white rounded-3xl p-6 shadow-sm">
                        <h2 class="text-xl font-semibold text-gray-800">Materiais</h2>
                        <ul id="disciplina-materiais" class="mt-4 space-y-4 text-gray-700"></ul>
                    </div>
                    <div class="grid gap-6">
                        <div class="bg-white rounded-3xl p-6 shadow-sm">
                            <h2 class="text-xl font-semibold text-gray-800">Dúvidas</h2>
                            <ul id="disciplina-duvidas" class="mt-4 space-y-3 text-gray-700"></ul>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <footer class="bg-[#166534] text-white text-center text-xs py-2">
        &copy; 2026 - Rede de Monitoria. Todos os direitos reservados.
    </footer>
    <script src="js/authGuard.js"></script>
    <script type="module" src="js/home.js"></script>
</body>
</html>
