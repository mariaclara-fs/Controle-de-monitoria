<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Cadastro - Rede de Monitoria</title>
</head>

<body>
  <main class="min-h-screen flex">

    <section class="w-full md:w-1/2 bg-gradient-to-br from-green-800 to-green-600 flex flex-col justify-center items-center p-16 gap-8 hidden md:flex">

      <div class="w-44 bg-white p-4 rounded-xl shadow-lg">
        <img src="./assets/Logo_RDM.png" alt="logo" class="w-full">
      </div>

      <div class="text-center max-w-md">
        <h2 class="text-white text-2xl font-bold mb-2">Crie sua conta!</h2>

        <p class="text-white">
          Faça parte da Rede de Monitoria e conecte-se com alunos, monitores e coordenadores em um só lugar.
        </p>
      </div>
    </section>

    <section class="w-full md:w-1/2 flex items-center justify-center bg-white">
        
      <div class="max-w-md w-full px-8 py-8">

        <h1 class="text-3xl text-gray-800 font-bold mb-8">Cadastro</h1>

        <form class="flex flex-col gap-4">

          <div>
            <label for="nome" class="block mb-2">Nome completo</label>

            <input id="nome" type="text" placeholder="Digite seu nome completo" class="border border-gray-300 rounded-lg px-4 py-2 w-full focus:outline-none focus:border-green-600 focus:shadow-sm transition"/>
          </div>

          <div>
            <label for="matricula" class="block mb-2">Matrícula</label>

            <input id="matricula" type="text" inputmode="numeric" placeholder="Digite sua matrícula" class="border border-gray-300 rounded-lg px-4 py-2 w-full focus:outline-none focus:border-green-600 focus:shadow-sm transition"/>
          </div>

          <div>
            <label for="email" class="block mb-2">E-mail acadêmico</label>

            <input id="email" type="email" placeholder="seuemail@academico.com" class="border border-gray-300 rounded-lg px-4 py-2 w-full focus:outline-none focus:border-green-600 focus:shadow-sm transition"/>
          </div>

          <div>
            <label for="senha" class="block mb-2">Senha</label>

            <input id="senha" type="password" placeholder="Crie uma senha" class="border border-gray-300 rounded-lg px-4 py-2 w-full focus:outline-none focus:border-green-600 focus:shadow-sm transition"/>
          </div>

          <div>
            <label class="block mb-2">Foto de perfil</label>

            <div class="flex items-center gap-4">

              <label for="foto" class="bg-green-100 text-[#166534] px-4 py-2 rounded-lg font-medium cursor-pointer hover:bg-green-200 transition">
                Escolher arquivo
              </label>

              <span id="nome-arquivo" class="text-sm text-gray-500">Nenhum arquivo escolhido</span>
            </div>

            <input id="foto" type="file" class="hidden"/>
          </div>

          <button id="btn_cadastro" type="submit" class="w-full bg-[#166534] text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition duration-200 shadow-sm cursor-pointer hover:shadow-md mt-2">Criar conta</button>
        </form>

        <p class="text-center mt-8 text-gray-600">
          Já possui uma conta?
          <a href="login.html" class="text-[#166534] font-bold hover:underline">Faça login</a>
        </p>
      </div>
    </section>
  </main>

  <script type="module" src="./js/cadastro.js"></script>
</body>
</html>
